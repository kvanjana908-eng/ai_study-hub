<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindSpark AI | Next-Gen AI Educational Workspace</title>
  <meta name="description" content="AI-powered interactive study workspace that turns any learning material into smart summaries, dynamic quizzes, flashcards, visual mindmaps, and Socratic tutoring using Google Gemini." />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  
  <!-- KaTeX CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  
  <!-- React & ReactDOM (UMD) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel standalone for JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Canvas Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* MindSpark AI - Notion/ChatGPT Design System */
    :root {
      --bg-primary: #0b0f17;
      --bg-secondary: #131b2e;
      --bg-tertiary: #1b2640;
      --bg-card: rgba(23, 32, 54, 0.75);
      --bg-card-hover: rgba(30, 42, 70, 0.85);
      --bg-input: #101726;
      
      --border-subtle: rgba(255, 255, 255, 0.08);
      --border-medium: rgba(255, 255, 255, 0.16);
      --border-focus: #6366f1;
      
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      
      --accent-primary: #6366f1;
      --accent-secondary: #06b6d4;
      --accent-emerald: #10b981;
      --accent-amber: #f59e0b;
      --accent-rose: #f43f5e;
      --accent-purple: #8b5cf6;
      
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.4);
      --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.25);
      
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      
      --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      
      --sidebar-width: 280px;
      --header-height: 60px;
    }

    body.light-theme {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --bg-card: rgba(255, 255, 255, 0.85);
      --bg-card-hover: #f1f5f9;
      --bg-input: #ffffff;
      
      --border-subtle: rgba(0, 0, 0, 0.08);
      --border-medium: rgba(0, 0, 0, 0.16);
      --border-focus: #4f46e5;
      
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%; width: 100%; overflow: hidden;
      font-family: var(--font-sans);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.2); border-radius: 4px; }

    .app-container { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
    .main-area { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; background: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.07) 0%, transparent 60%); }

    .top-navbar {
      height: var(--header-height); display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem; border-bottom: 1px solid var(--border-subtle); background: rgba(19, 27, 46, 0.7);
      backdrop-filter: blur(12px); z-index: 10;
    }
    .top-nav-left { display: flex; items-center; gap: 1rem; }
    .material-title-badge { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 0.9rem; color: var(--text-primary); background: var(--bg-tertiary); padding: 0.35rem 0.75rem; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
    .nav-tabs { display: flex; gap: 0.3rem; background: var(--bg-input); padding: 0.25rem; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
    .nav-tab-btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.75rem; border-radius: var(--radius-sm); border: none; background: transparent; color: var(--text-secondary); font-size: 0.825rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
    .nav-tab-btn:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.05); }
    .nav-tab-btn.active { background: var(--accent-primary); color: #ffffff; font-weight: 600; box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4); }

    .btn-primary { display: inline-flex; align-items: center; gap: 0.5rem; background: linear-gradient(135deg, var(--accent-primary) 0%, #4f46e5 100%); color: #ffffff; border: none; padding: 0.55rem 1.1rem; border-radius: var(--radius-md); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 2px 10px rgba(99, 102, 241, 0.3); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99, 102, 241, 0.5); }
    .btn-secondary { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-medium); padding: 0.55rem 1.1rem; border-radius: var(--radius-md); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
    .btn-secondary:hover { background: var(--bg-card-hover); border-color: var(--text-secondary); }
    .btn-ghost { display: inline-flex; align-items: center; gap: 0.4rem; background: transparent; color: var(--text-secondary); border: none; padding: 0.4rem 0.6rem; border-radius: var(--radius-sm); font-size: 0.825rem; cursor: pointer; transition: all 0.2s ease; }
    .btn-ghost:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.08); }

    .glass-card { background: var(--bg-card); backdrop-filter: blur(16px); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow-md); transition: border-color 0.2s ease; }
    .glass-card:hover { border-color: var(--border-medium); }

    .tab-viewport { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; display: flex; flex-direction: column; }
    .gradient-text { background: linear-gradient(135deg, #a5b4fc 0%, #38bdf8 50%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes pulseGlow { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    .ai-pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-secondary); animation: pulseGlow 1.5s infinite ease-in-out; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1.5rem; }
    .modal-content { background: var(--bg-secondary); border: 1px solid var(--border-medium); border-radius: var(--radius-xl); width: 100%; max-width: 600px; max-height: 85vh; overflow-y: auto; padding: 2rem; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; gap: 1.25rem; }
  </style>
</head>
<body class="dark-theme">
  <div id="root"></div>

  <!-- Standalone Application Script -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Default pre-configured API Key
    const DEFAULT_API_KEY = 'AQ.Ab8RN6LQuCZBBJcXySzwmosUVKx3ajJLF1yn-GcOx9S3Sk9nqw';
    const DEFAULT_MODEL = 'gemini-2.0-flash';

    const getStoredApiKey = () => localStorage.getItem('mindspark_gemini_key') || DEFAULT_API_KEY;
    const setStoredApiKey = (key) => key ? localStorage.setItem('mindspark_gemini_key', key.trim()) : localStorage.removeItem('mindspark_gemini_key');
    const getStoredModel = () => localStorage.getItem('mindspark_gemini_model') || DEFAULT_MODEL;
    const setStoredModel = (model) => localStorage.setItem('mindspark_gemini_model', model);

    // Core Gemini API Client
    async function callGeminiAPI({ prompt, systemInstruction, responseSchema = null }) {
      const apiKey = getStoredApiKey();
      const model = getStoredModel();
      if (!apiKey) throw new Error('Gemini API key missing.');

      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
      const bodyPayload = {
        contents: [{ role: 'user', parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.7 }
      };

      if (systemInstruction) {
        bodyPayload.systemInstruction = { parts: [{ text: systemInstruction }] };
      }
      if (responseSchema) {
        bodyPayload.generationConfig.responseMimeType = "application/json";
        bodyPayload.generationConfig.responseSchema = responseSchema;
      }

      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
        body: JSON.stringify(bodyPayload)
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`Gemini API Error (${res.status}): ${errText}`);
      }

      const data = await res.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    }

    function cleanAndParseJSON(text) {
      try { return JSON.parse(text); } catch (e) {
        const match = text.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
        if (match && match[1]) return JSON.parse(match[1]);
        throw new Error("Could not parse JSON response from Gemini.");
      }
    }

    // Sample Materials
    const SAMPLE_MATERIALS = [
      {
        id: 'mat-1',
        title: 'Quantum Computing & Qubits',
        category: 'Computer Science',
        content: `# Quantum Computing & Superposition\n\nQuantum computing uses quantum mechanics to process data exponentially faster than classical computers.\n\n## 1. Classical Bits vs. Qubits\n- Classical Bit: 0 or 1.\n- Qubit: $|\\psi\\rangle = \\alpha|0\\rangle + \\beta|1\\rangle$ where $|\\alpha|^2 + |\\beta|^2 = 1$.\n\n## 2. Entanglement & Algorithms\n- Bell State: $|\\Phi^+\\rangle = \\frac{1}{\\sqrt{2}}(|00\\rangle + |11\\rangle)$\n- Shor's Algorithm: Integer factorization in polynomial time.`
      },
      {
        id: 'mat-2',
        title: 'Cellular Respiration & ATP Synthesis',
        category: 'Biology',
        content: `# Cellular Respiration\n\nMetabolic process converting nutrients into ATP.\n\nNet Equation:\n$$C_6H_{12}O_6 + 6O_2 \\rightarrow 6CO_2 + 6H_2O + \\sim 32\\text{ ATP}$$\n\nStages:\n1. Glycolysis (Cytosol)\n2. Pyruvate Oxidation\n3. Citric Acid Cycle\n4. Oxidative Phosphorylation & ATP Synthase.`
      }
    ];

    // Main App Component
    function App() {
      const [materials, setMaterials] = useState(SAMPLE_MATERIALS);
      const [activeMaterialId, setActiveMaterialId] = useState('mat-1');
      const [activeTab, setActiveTab] = useState('overview');
      const [apiKey, setApiKey] = useState(getStoredApiKey());
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);

      const activeMaterial = materials.find(m => m.id === activeMaterialId) || materials[0];

      return (
        <div className="app-container">
          {/* Sidebar */}
          <aside style={{ width: '280px', height: '100vh', background: 'var(--bg-secondary)', borderRight: '1px solid var(--border-subtle)', display: 'flex', flexDirection: 'column', padding: '1rem' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.6rem', marginBottom: '1.5rem' }}>
              <div style={{ width: '32px', height: '32px', borderRadius: '8px', background: 'linear-gradient(135deg, #6366f1, #06b6d4)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 800 }}>✨</div>
              <h1 style={{ fontSize: '1rem', fontWeight: 800 }}>MindSpark <span className="gradient-text">AI</span></h1>
            </div>

            <button className="btn-primary" onClick={() => {
              const topic = prompt("Enter study topic prompt:");
              if (!topic) return;
              callGeminiAPI({
                prompt: `Create a detailed study guide for: ${topic}`,
                systemInstruction: "You are an educational author. Write markdown."
              }).then(text => {
                const newMat = { id: `mat-${Date.now()}`, title: topic, category: 'AI Generated', content: text };
                setMaterials([newMat, ...materials]);
                setActiveMaterialId(newMat.id);
              }).catch(err => alert(err.message));
            }} style={{ marginBottom: '1rem', justifyContent: 'center' }}>
              + New AI Study Guide
            </button>

            <div style={{ fontSize: '0.725rem', fontWeight: 700, color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: '0.5rem' }}>
              Notebooks ({materials.length})
            </div>

            <div style={{ flex: 1, overflowY: 'auto' }}>
              {materials.map(m => (
                <div
                  key={m.id}
                  onClick={() => setActiveMaterialId(m.id)}
                  style={{
                    padding: '0.6rem 0.75rem',
                    borderRadius: '8px',
                    cursor: 'pointer',
                    background: m.id === activeMaterialId ? 'var(--bg-tertiary)' : 'transparent',
                    borderLeft: m.id === activeMaterialId ? '3px solid var(--accent-primary)' : '3px solid transparent',
                    marginBottom: '0.2rem',
                    fontSize: '0.85rem',
                    fontWeight: m.id === activeMaterialId ? 600 : 500
                  }}
                >
                  📄 {m.title}
                </div>
              ))}
            </div>

            <button className="btn-ghost" onClick={() => setIsSettingsOpen(true)} style={{ marginTop: 'auto' }}>
              ⚙️ Gemini Key Settings
            </button>
          </aside>

          {/* Main Area */}
          <main className="main-area">
            {/* Top Bar */}
            <header className="top-navbar">
              <div className="material-title-badge">📚 {activeMaterial?.title}</div>
              <div className="nav-tabs">
                {[
                  { id: 'overview', label: 'Notes' },
                  { id: 'tutor', label: 'AI Tutor Chat' },
                  { id: 'summary', label: 'AI Summary' },
                  { id: 'quiz', label: 'Dynamic Quiz' },
                  { id: 'flashcards', label: 'Flashcards' },
                  { id: 'mindmap', label: 'Mind Map' },
                  { id: 'roadmap', label: 'Roadmap' }
                ].map(t => (
                  <button key={t.id} className={`nav-tab-btn ${activeTab === t.id ? 'active' : ''}`} onClick={() => setActiveTab(t.id)}>
                    {t.label}
                  </button>
                ))}
              </div>
            </header>

            {/* Viewports */}
            {activeTab === 'overview' && (
              <div className="tab-viewport">
                <div className="glass-card" style={{ whiteSpace: 'pre-wrap', lineHeight: 1.6 }}>
                  {activeMaterial?.content}
                </div>
              </div>
            )}

            {activeTab === 'tutor' && <TutorTab material={activeMaterial} />}
            {activeTab === 'summary' && <SummaryTab material={activeMaterial} />}
            {activeTab === 'quiz' && <QuizTab material={activeMaterial} />}
            {activeTab === 'flashcards' && <FlashcardsTab material={activeMaterial} />}
            {activeTab === 'mindmap' && <MindMapTab material={activeMaterial} />}
            {activeTab === 'roadmap' && <RoadmapTab material={activeMaterial} />}
          </main>

          {/* Settings Modal */}
          {isSettingsOpen && (
            <div className="modal-overlay" onClick={() => setIsSettingsOpen(false)}>
              <div className="modal-content" onClick={e => e.stopPropagation()}>
                <h2>⚙️ Gemini API Settings</h2>
                <input
                  type="password"
                  value={apiKey}
                  onChange={e => setApiKey(e.target.value)}
                  style={{ padding: '0.75rem', background: 'var(--bg-input)', border: '1px solid var(--border-medium)', color: '#fff', borderRadius: '8px', width: '100%' }}
                />
                <button className="btn-primary" onClick={() => { setStoredApiKey(apiKey); setIsSettingsOpen(false); }}>
                  Save Key
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // AI Tutor Tab
    function TutorTab({ material }) {
      const [messages, setMessages] = useState([{ role: 'assistant', text: `Hello! I am your AI Socratic Tutor for "${material?.title}". What would you like to explore?` }]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);

      const send = async () => {
        if (!input.trim() || loading) return;
        const q = input;
        setInput('');
        setMessages(prev => [...prev, { role: 'user', text: q }]);
        setLoading(true);
        try {
          const res = await callGeminiAPI({
            prompt: `Student question: ${q}`,
            systemInstruction: `You are a Socratic AI Tutor for material:\n${material.content.substring(0, 8000)}`
          });
          setMessages(prev => [...prev, { role: 'assistant', text: res }]);
        } catch (e) {
          setMessages(prev => [...prev, { role: 'assistant', text: `Error: ${e.message}` }]);
        } finally { setLoading(false); }
      };

      return (
        <div className="tab-viewport" style={{ gap: '1rem' }}>
          <div style={{ flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
            {messages.map((m, i) => (
              <div key={i} style={{ alignSelf: m.role === 'user' ? 'flex-end' : 'flex-start', background: m.role === 'user' ? 'var(--accent-primary)' : 'var(--bg-card)', padding: '0.8rem 1.1rem', borderRadius: '14px', maxWidth: '75%', whiteSpace: 'pre-wrap' }}>
                {m.text}
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: '0.5rem' }}>
            <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()} style={{ flex: 1, padding: '0.75rem', background: 'var(--bg-input)', border: '1px solid var(--border-medium)', color: '#fff', borderRadius: '12px' }} placeholder="Ask your AI tutor..." />
            <button className="btn-primary" onClick={send} disabled={loading}>{loading ? 'Thinking...' : 'Send'}</button>
          </div>
        </div>
      );
    }

    // AI Summary Tab
    function SummaryTab({ material }) {
      const [summary, setSummary] = useState(null);
      const [loading, setLoading] = useState(false);

      const generate = async () => {
        setLoading(true);
        try {
          const schema = {
            type: "OBJECT",
            properties: {
              tldr: { type: "STRING" },
              executiveSummary: { type: "STRING" },
              simplifiedAnalogy: { type: "STRING" }
            },
            required: ["tldr", "executiveSummary", "simplifiedAnalogy"]
          };
          const res = await callGeminiAPI({
            prompt: `Summarize: ${material.content.substring(0, 10000)}`,
            systemInstruction: "Generate a structured summary JSON.",
            responseSchema: schema
          });
          setSummary(cleanAndParseJSON(res));
        } catch (e) { alert(e.message); } finally { setLoading(false); }
      };

      return (
        <div className="tab-viewport">
          <button className="btn-primary" onClick={generate} disabled={loading} style={{ alignSelf: 'flex-start', marginBottom: '1rem' }}>
            {loading ? 'Analyzing...' : '⚡ Generate AI Summary'}
          </button>
          {summary && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
              <div className="glass-card" style={{ borderLeft: '4px solid var(--accent-secondary)' }}>
                <strong>TL;DR:</strong> {summary.tldr}
              </div>
              <div className="glass-card" style={{ borderLeft: '4px solid var(--accent-amber)' }}>
                <strong>ELI5 Analogy:</strong> {summary.simplifiedAnalogy}
              </div>
              <div className="glass-card">
                <strong>Executive Summary:</strong>
                <p style={{ marginTop: '0.5rem', whiteSpace: 'pre-wrap' }}>{summary.executiveSummary}</p>
              </div>
            </div>
          )}
        </div>
      );
    }

    // AI Quiz Tab
    function QuizTab({ material }) {
      const [quiz, setQuiz] = useState(null);
      const [userAnswers, setUserAnswers] = useState({});
      const [evalResult, setEvalResult] = useState(null);
      const [loading, setLoading] = useState(false);

      const generate = async () => {
        setLoading(true);
        setEvalResult(null);
        try {
          const schema = {
            type: "OBJECT",
            properties: {
              quizTitle: { type: "STRING" },
              questions: {
                type: "ARRAY",
                items: {
                  type: "OBJECT",
                  properties: {
                    id: { type: "STRING" },
                    question: { type: "STRING" },
                    options: { type: "ARRAY", items: { type: "STRING" } },
                    correctAnswer: { type: "STRING" }
                  },
                  required: ["id", "question", "options", "correctAnswer"]
                }
              }
            },
            required: ["quizTitle", "questions"]
          };
          const res = await callGeminiAPI({
            prompt: `Generate 3 quiz questions for: ${material.content.substring(0, 10000)}`,
            systemInstruction: "Create a quiz JSON.",
            responseSchema: schema
          });
          setQuiz(cleanAndParseJSON(res));
        } catch (e) { alert(e.message); } finally { setLoading(false); }
      };

      const submit = async () => {
        setLoading(true);
        try {
          const schema = {
            type: "OBJECT",
            properties: {
              overallScore: { type: "NUMBER" },
              masteryLevel: { type: "STRING" },
              feedback: { type: "STRING" }
            },
            required: ["overallScore", "masteryLevel", "feedback"]
          };
          const res = await callGeminiAPI({
            prompt: `Evaluate: Questions=${JSON.stringify(quiz.questions)}, Answers=${JSON.stringify(userAnswers)}`,
            systemInstruction: "Evaluate student score out of 100 in JSON.",
            responseSchema: schema
          });
          const ev = cleanAndParseJSON(res);
          setEvalResult(ev);
          if (ev.overallScore >= 70 && window.confetti) window.confetti();
        } catch (e) { alert(e.message); } finally { setLoading(false); }
      };

      return (
        <div className="tab-viewport">
          <button className="btn-primary" onClick={generate} disabled={loading} style={{ alignSelf: 'flex-start', marginBottom: '1rem' }}>
            {loading ? 'Generating Quiz...' : '❓ Start Dynamic AI Quiz'}
          </button>

          {quiz && !evalResult && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem', maxWidth: '600px' }}>
              {quiz.questions.map((q, idx) => (
                <div key={q.id} className="glass-card">
                  <strong>Q{idx + 1}: {q.question}</strong>
                  <div style={{ marginTop: '0.75rem', display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                    {q.options.map((opt, oIdx) => (
                      <button
                        key={oIdx}
                        onClick={() => setUserAnswers({ ...userAnswers, [q.id]: opt })}
                        style={{
                          padding: '0.6rem',
                          borderRadius: '6px',
                          border: userAnswers[q.id] === opt ? '2px solid var(--accent-primary)' : '1px solid var(--border-medium)',
                          background: userAnswers[q.id] === opt ? 'rgba(99, 102, 241, 0.2)' : 'var(--bg-input)',
                          color: '#fff',
                          textAlign: 'left',
                          cursor: 'pointer'
                        }}
                      >
                        {opt}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
              <button className="btn-primary" onClick={submit} disabled={loading}>Submit Quiz for AI Evaluation</button>
            </div>
          )}

          {evalResult && (
            <div className="glass-card" style={{ textAlign: 'center', maxWidth: '500px', margin: '0 auto' }}>
              <h2>Mastery Level: {evalResult.masteryLevel}</h2>
              <h1 className="gradient-text" style={{ fontSize: '3rem', margin: '1rem 0' }}>{evalResult.overallScore}%</h1>
              <p>{evalResult.feedback}</p>
            </div>
          )}
        </div>
      );
    }

    // Flashcards Tab
    function FlashcardsTab({ material }) {
      const [cards, setCards] = useState(null);
      const [idx, setIdx] = useState(0);
      const [flipped, setFlipped] = useState(false);

      const generate = async () => {
        const schema = {
          type: "OBJECT",
          properties: {
            cards: {
              type: "ARRAY",
              items: {
                type: "OBJECT",
                properties: { front: { type: "STRING" }, back: { type: "STRING" } },
                required: ["front", "back"]
              }
            }
          },
          required: ["cards"]
        };
        const res = await callGeminiAPI({
          prompt: `Create 5 flashcards for: ${material.content.substring(0, 10000)}`,
          systemInstruction: "Create JSON flashcards.",
          responseSchema: schema
        });
        setCards(cleanAndParseJSON(res).cards);
        setIdx(0);
        setFlipped(false);
      };

      return (
        <div className="tab-viewport" style={{ alignItems: 'center' }}>
          <button className="btn-primary" onClick={generate} style={{ marginBottom: '1.5rem' }}>🎴 Generate Flashcard Deck</button>
          {cards && cards[idx] && (
            <div style={{ maxWidth: '500px', width: '100%' }}>
              <div className="glass-card" onClick={() => setFlipped(!flipped)} style={{ height: '240px', display: 'flex', alignItems: 'center', justifyContent: 'center', textAlign: 'center', fontSize: '1.2rem', fontWeight: 600, cursor: 'pointer', border: '2px solid var(--accent-purple)' }}>
                {flipped ? cards[idx].back : cards[idx].front}
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '1rem' }}>
                <button className="btn-secondary" onClick={() => { setIdx(Math.max(0, idx - 1)); setFlipped(false); }}>Previous</button>
                <span>{idx + 1} / {cards.length}</span>
                <button className="btn-secondary" onClick={() => { setIdx((idx + 1) % cards.length); setFlipped(false); }}>Next</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Mind Map Tab
    function MindMapTab({ material }) {
      const [map, setMap] = useState(null);

      const generate = async () => {
        const schema = {
          type: "OBJECT",
          properties: {
            root: {
              type: "OBJECT",
              properties: {
                label: { type: "STRING" },
                children: {
                  type: "ARRAY",
                  items: {
                    type: "OBJECT",
                    properties: { label: { type: "STRING" }, description: { type: "STRING" } },
                    required: ["label", "description"]
                  }
                }
              },
              required: ["label", "children"]
            }
          },
          required: ["root"]
        };
        const res = await callGeminiAPI({
          prompt: `Create a mind map hierarchy for: ${material.content.substring(0, 10000)}`,
          systemInstruction: "Create JSON hierarchy.",
          responseSchema: schema
        });
        setMap(cleanAndParseJSON(res).root);
      };

      return (
        <div className="tab-viewport">
          <button className="btn-primary" onClick={generate} style={{ alignSelf: 'flex-start', marginBottom: '1rem' }}>🌿 Generate Mind Map</button>
          {map && (
            <div className="glass-card" style={{ display: 'flex', flexDirection: 'column', gap: '1rem', alignItems: 'center' }}>
              <div style={{ padding: '0.8rem 1.5rem', background: 'var(--accent-primary)', color: '#fff', borderRadius: '12px', fontWeight: 800 }}>
                🌐 {map.label}
              </div>
              <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', justifyContent: 'center' }}>
                {map.children?.map((c, i) => (
                  <div key={i} className="glass-card" style={{ maxWidth: '220px' }}>
                    <div style={{ fontWeight: 700, color: 'var(--accent-secondary)' }}>{c.label}</div>
                    <div style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '0.3rem' }}>{c.description}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // Roadmap Tab
    function RoadmapTab({ material }) {
      const [roadmap, setRoadmap] = useState(null);

      const generate = async () => {
        const schema = {
          type: "OBJECT",
          properties: {
            goal: { type: "STRING" },
            phases: {
              type: "ARRAY",
              items: {
                type: "OBJECT",
                properties: { title: { type: "STRING" }, objective: { type: "STRING" } },
                required: ["title", "objective"]
              }
            }
          },
          required: ["goal", "phases"]
        };
        const res = await callGeminiAPI({
          prompt: `Create study roadmap for: ${material.content.substring(0, 10000)}`,
          systemInstruction: "Create JSON roadmap.",
          responseSchema: schema
        });
        setRoadmap(cleanAndParseJSON(res));
      };

      return (
        <div className="tab-viewport">
          <button className="btn-primary" onClick={generate} style={{ alignSelf: 'flex-start', marginBottom: '1rem' }}>🧭 Generate Roadmap</button>
          {roadmap && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
              <div className="glass-card" style={{ borderLeft: '4px solid var(--accent-emerald)' }}>
                <strong>Target Goal:</strong> {roadmap.goal}
              </div>
              {roadmap.phases?.map((p, i) => (
                <div key={i} className="glass-card">
                  <h4>Phase {i + 1}: {p.title}</h4>
                  <p style={{ color: 'var(--text-secondary)', marginTop: '0.3rem', fontSize: '0.9rem' }}>{p.objective}</p>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
